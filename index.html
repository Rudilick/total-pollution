<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>환경 검토 시스템</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f6f7fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .brand {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    .brand-title {
      font-size: 22px;
      font-weight: 900;
      color: #121826;
      letter-spacing: -0.3px;
    }
    .brand-sub {
      margin-top: 8px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.7;
    }

    .cards {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      outline: none;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.04);
    }
    .card:focus-visible {
      outline: 3px solid #3b82f6;
      outline-offset: 4px;
    }

    .card-water {
      background: linear-gradient(145deg, #1a7f64 0%, #059669 55%, #0d9488 100%);
      box-shadow: 0 12px 40px rgba(26, 127, 100, 0.38);
    }
    .card-water:hover {
      box-shadow: 0 20px 52px rgba(26, 127, 100, 0.48);
    }

    .card-dxf {
      background: linear-gradient(145deg, #185fa5 0%, #2563eb 55%, #0284c7 100%);
      box-shadow: 0 12px 40px rgba(24, 95, 165, 0.38);
    }
    .card-dxf:hover {
      box-shadow: 0 20px 52px rgba(24, 95, 165, 0.48);
    }

    .card-icon {
      font-size: 42px;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
    }
    .card-name {
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      text-align: center;
      line-height: 1.4;
      padding: 0 18px;
      letter-spacing: -0.2px;
    }
    .card-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.78);
      text-align: center;
      line-height: 1.5;
      padding: 0 20px;
    }

    .footer {
      margin-top: 4rem;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }

    @media (max-width: 560px) {
      .cards { gap: 1.8rem; }
      .card { width: 200px; height: 200px; }
      .card-icon { font-size: 34px; }
      .card-name { font-size: 13px; }
      .card-desc { font-size: 10px; }
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-title">환경 검토 시스템</div>
    <p class="brand-sub">수질오염총량 검토서 작성 및 토지이용계획 변경률 분석 도구</p>
  </div>

  <div class="cards">

    <a class="card card-water" href="water.html" title="수질오염총량검토서 작성">
      <span class="card-icon">💧</span>
      <span class="card-name">수질오염총량<br>검토서 작성</span>
      <span class="card-desc">생활계·토지계 오염원 입력 및<br>Word 검토서 자동 생성</span>
    </a>

    <a class="card card-dxf" href="dxf/index.html" title="환경영향평가 변경률 검토">
      <span class="card-icon">🗺️</span>
      <span class="card-name">환경영향평가<br>변경률 검토</span>
      <span class="card-desc">DXF 도면 단계별 분석으로<br>토지이용 변경률 자동 산출</span>
    </a>

  </div>

  <div class="footer">수질 오염 총량 검토 시스템</div>

</body>
</html>
