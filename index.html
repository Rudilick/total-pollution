<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>환경 검토 시스템</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3vh 4vw;
    }

    .brand {
      text-align: center;
      margin-bottom: clamp(2rem, 5vh, 4rem);
    }
    .brand-title {
      font-size: clamp(22px, 2.8vw, 38px);
      font-weight: 900;
      color: #121826;
      letter-spacing: -0.5px;
    }
    .brand-sub {
      margin-top: 10px;
      font-size: clamp(13px, 1.2vw, 17px);
      color: #6b7280;
      line-height: 1.7;
    }

    .cards {
      display: flex;
      gap: clamp(2rem, 5vw, 6rem);
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: clamp(280px, 30vw, 420px);
      height: clamp(280px, 30vw, 420px);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 1.5vw, 22px);
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      outline: none;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.04);
    }
    .card:focus-visible {
      outline: 3px solid #3b82f6;
      outline-offset: 4px;
    }

    .card-water {
      background: linear-gradient(145deg, #1a7f64 0%, #059669 55%, #0d9488 100%);
      box-shadow: 0 16px 56px rgba(26, 127, 100, 0.40);
    }
    .card-water:hover {
      box-shadow: 0 28px 70px rgba(26, 127, 100, 0.52);
    }

    .card-dxf {
      background: linear-gradient(145deg, #185fa5 0%, #2563eb 55%, #0284c7 100%);
      box-shadow: 0 16px 56px rgba(24, 95, 165, 0.40);
    }
    .card-dxf:hover {
      box-shadow: 0 28px 70px rgba(24, 95, 165, 0.52);
    }

    .card-icon {
      font-size: clamp(52px, 6vw, 88px);
      line-height: 1;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.22));
    }
    .card-name {
      font-size: clamp(16px, 1.6vw, 24px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      line-height: 1.4;
      padding: 0 8%;
      letter-spacing: -0.3px;
    }
    .card-desc {
      font-size: clamp(12px, 1vw, 16px);
      color: rgba(255,255,255,0.82);
      text-align: center;
      line-height: 1.6;
      padding: 0 10%;
    }

    .footer {
      margin-top: clamp(2rem, 4vh, 4rem);
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }

    @media (max-width: 760px) {
      .cards { gap: 2rem; }
      .card { width: 260px; height: 260px; }
      .card-icon { font-size: 52px; }
      .card-name { font-size: 17px; }
      .card-desc { font-size: 12px; }
    }
    @media (max-width: 520px) {
      .cards { flex-direction: column; align-items: center; gap: 1.8rem; }
      .card { width: 75vw; height: 75vw; }
      .card-icon { font-size: 44px; }
      .card-name { font-size: 16px; }
      .card-desc { font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-title">환경 검토 시스템</div>
    <p class="brand-sub">수질오염총량 검토서 작성 및 토지이용계획 변경률 분석 도구</p>
  </div>

  <div class="cards">

    <a class="card card-water" href="water.html" title="수질오염총량검토서 작성">
      <span class="card-icon">💧</span>
      <span class="card-name">수질오염총량<br>검토서 작성</span>
      <span class="card-desc">생활계·토지계 오염원 입력 및<br>Word 검토서 자동 생성</span>
    </a>

    <a class="card card-dxf" href="dxf/index.html" title="환경영향평가 변경률 검토">
      <span class="card-icon">🗺️</span>
      <span class="card-name">환경영향평가<br>변경률 검토</span>
      <span class="card-desc">DXF 도면 단계별 분석으로<br>토지이용 변경률 자동 산출</span>
    </a>

  </div>

  <div class="footer">수질 오염 총량 검토 시스템</div>

</body>
</html>
