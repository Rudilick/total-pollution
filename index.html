<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>수질오염총량 자동화</title>
<style>
body { font-family: sans-serif; padding: 20px; }
select, input { margin: 5px; padding: 5px; }
.box { border:1px solid #ccc; padding:10px; margin:10px 0; }
</style>
</head>

<body>

<h2>생활계 입력</h2>

<div class="box">
  대분류:
  <select id="major" onchange="onMajorChange(this.value)"></select>

  중분류:
  <select id="mid" onchange="onMidChange(this.value)"></select>

  소분류:
  <select id="minor"></select>
</div>

<div class="box">
  <button onclick="addBuilding()">동 추가</button>
  <div id="buildings"></div>
</div>

<script>
let LIFE_USE_DB = {};

// ============================
// 🔥 GCS 데이터 불러오기
// ============================
async function loadLifeData() {
  const res = await fetch("https://rudilick-backend.onrender.com/init-life-data");
  const data = await res.json();

  LIFE_USE_DB = buildDB(data.rows);

  buildMajor();
}

// ============================
// DB 구조 변환
// ============================
function buildDB(rows){
  const db = {};

  rows.forEach(r=>{
    const [major, mid, minor] = r;

    if(!db[major]) db[major] = {};
    if(!db[major][mid]) db[major][mid] = [];

    db[major][mid].push(minor);
  });

  return db;
}

// ============================
// 드롭다운 생성
// ============================
function buildMajor(){
  const sel = document.getElementById("major");
  sel.innerHTML = "";

  Object.keys(LIFE_USE_DB).forEach(k=>{
    const o = new Option(k,k);
    sel.add(o);
  });

  onMajorChange(sel.value);
}

function onMajorChange(val){
  const mid = document.getElementById("mid");
  mid.innerHTML = "";

  Object.keys(LIFE_USE_DB[val]).forEach(k=>{
    mid.add(new Option(k,k));
  });

  onMidChange(mid.value);
}

function onMidChange(val){
  const major = document.getElementById("major").value;
  const minor = document.getElementById("minor");

  minor.innerHTML = "";

  LIFE_USE_DB[major][val].forEach(v=>{
    minor.add(new Option(v,v));
  });
}

// ============================
// 동/층/용도 구조 (유지)
// ============================
let buildings = [];

function addBuilding(){
  const id = buildings.length;

  buildings.push({ floors:[] });

  const div = document.createElement("div");
  div.innerHTML = `
    <div class="box">
      <b>동 ${id+1}</b>
      <button onclick="addFloor(${id})">층 추가</button>
      <div id="floor-${id}"></div>
    </div>
  `;

  document.getElementById("buildings").appendChild(div);
}

function addFloor(bid){
  const fId = buildings[bid].floors.length;
  buildings[bid].floors.push({ uses:[] });

  const div = document.createElement("div");
  div.innerHTML = `
    <div>
      층 ${fId+1}
      <button onclick="addUse(${bid},${fId})">용도 추가</button>
      <div id="use-${bid}-${fId}"></div>
    </div>
  `;

  document.getElementById(`floor-${bid}`).appendChild(div);
}

function addUse(bid,fid){
  const uId = buildings[bid].floors[fid].uses.length;
  buildings[bid].floors[fid].uses.push({});

  const div = document.createElement("div");
  div.innerHTML = `
    용도 ${uId+1}
    면적 <input type="number" />
    비오수 <input type="checkbox" />
  `;

  document.getElementById(`use-${bid}-${fid}`).appendChild(div);
}

// ============================
// 초기 실행
// ============================
window.onload = loadLifeData;

</script>

</body>
</html>
