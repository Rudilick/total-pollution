<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지역 비밀번호 관리</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="back-link" href="archive-admin.html">← 도면 아카이브 관리자로</a>
      <h1>지역 비밀번호 관리</h1>
      <p class="app-desc">지역(광역+기초자치단체) 로그인 비밀번호를 "0000"으로 초기화할 수 있습니다. 초기화하면 그 지역은 다음 로그인 때 비밀번호를 다시 설정해야 합니다.</p>
    </header>

    <section class="section">
      <div id="region-pw-list"></div>
    </section>
  </div>

  <script src="js/archive-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script>
    async function _loadRegionPwList() {
      const listEl = document.getElementById('region-pw-list');
      listEl.innerHTML = '<p class="archive-empty">불러오는 중...</p>';
      try {
        const res = await _adminFetch('/region-auth/admin/list');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '조회 실패');
        _renderRegionPwList(data.regions);
      } catch (e) {
        listEl.innerHTML = `<p class="status-err">${e.message}</p>`;
      }
    }

    function _renderRegionPwList(regions) {
      const listEl = document.getElementById('region-pw-list');
      listEl.innerHTML = '';
      if (!regions.length) {
        listEl.innerHTML = '<p class="archive-empty">등록된 지역이 없습니다(평가목록 엑셀을 업로드하면 자동으로 생깁니다).</p>';
        return;
      }
      regions.forEach(r => {
        const card = document.createElement('div');
        card.className = 'archive-card';
        const badge = r.must_change_password
          ? '<div class="pill pill-warn">초기 비밀번호(0000) 사용 중</div>'
          : '<div class="pill pill-nc">변경됨</div>';
        card.innerHTML =
          `<div class="archive-card-main">
             <div class="archive-card-title">${r.province} <span class="archive-card-name">${r.city}</span></div>
             <div class="archive-card-meta">최근 변경: ${new Date(r.updated_at).toLocaleString('ko-KR')}</div>
           </div>
           ${badge}`;
        const resetBtn = document.createElement('button');
        resetBtn.className = 'run-btn btn-sm';
        resetBtn.style.marginLeft = '10px';
        resetBtn.textContent = '0000으로 초기화';
        resetBtn.onclick = (e) => { e.stopPropagation(); _resetRegionPw(r.province, r.city); };
        card.appendChild(resetBtn);
        listEl.appendChild(card);
      });
    }

    async function _resetRegionPw(province, city) {
      if (!confirm(`${province} ${city}의 비밀번호를 "0000"으로 초기화하시겠습니까?`)) return;
      try {
        const res = await _adminFetch('/region-auth/admin/reset', {
          method: 'POST',
          body: JSON.stringify({ province, city }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '초기화 실패');
        _loadRegionPwList();
      } catch (e) {
        alert(e.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!_ensureAdminAuth()) return;
      _loadRegionPwList();
    });
  </script>
</body>
</html>
