<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지역 비밀번호 관리</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="back-link" href="archive-admin.html">← 도면 아카이브 관리자로</a>
      <h1>지역 비밀번호 관리</h1>
      <p class="app-desc">광역·기초자치단체를 선택하면 그 지역의 비밀번호 상태를 보고 "0000"으로 초기화할 수 있습니다. 초기화하면 그 지역은 다음 로그인 때 비밀번호를 다시 설정해야 합니다.</p>
    </header>

    <section class="section">
      <div class="archive-search-row">
        <select id="rp-province" class="admin-input" onchange="_onRpProvinceChange()">
          <option value="">광역자치단체 선택</option>
        </select>
        <select id="rp-city" class="admin-input" onchange="_onRpCityChange()" disabled>
          <option value="">기초자치단체 선택</option>
        </select>
      </div>
      <div id="region-pw-result"></div>
    </section>
  </div>

  <script src="js/archive-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script>
    let _rpRegions = [];

    async function _loadRpRegions() {
      try {
        const res = await _adminFetch('/region-auth/admin/list');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '조회 실패');
        _rpRegions = data.regions || [];
        const provinceSel = document.getElementById('rp-province');
        [...new Set(_rpRegions.map(r => r.province))].sort().forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          provinceSel.appendChild(opt);
        });
        if (!_rpRegions.length) {
          document.getElementById('region-pw-result').innerHTML =
            '<p class="archive-empty">등록된 지역이 없습니다(평가목록 엑셀을 업로드하면 자동으로 생깁니다).</p>';
        }
      } catch (e) {
        document.getElementById('region-pw-result').innerHTML = `<p class="status-err">${e.message}</p>`;
      }
    }

    function _onRpProvinceChange() {
      const province = document.getElementById('rp-province').value;
      const citySel = document.getElementById('rp-city');
      citySel.innerHTML = '<option value="">기초자치단체 선택</option>';
      document.getElementById('region-pw-result').innerHTML = '';
      if (!province) { citySel.disabled = true; return; }
      _rpRegions.filter(r => r.province === province).map(r => r.city).sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        citySel.appendChild(opt);
      });
      citySel.disabled = false;
    }

    function _onRpCityChange() {
      const province = document.getElementById('rp-province').value;
      const city = document.getElementById('rp-city').value;
      const resultEl = document.getElementById('region-pw-result');
      if (!city) { resultEl.innerHTML = ''; return; }

      const r = _rpRegions.find(x => x.province === province && x.city === city);
      if (!r) { resultEl.innerHTML = ''; return; }

      const card = document.createElement('div');
      card.className = 'archive-card';
      const badge = r.must_change_password
        ? '<div class="pill pill-warn">초기 비밀번호(0000) 사용 중</div>'
        : '<div class="pill pill-nc">변경됨</div>';
      card.innerHTML =
        `<div class="archive-card-main">
           <div class="archive-card-title">${r.province} <span class="archive-card-name">${r.city}</span></div>
           <div class="archive-card-meta">최근 변경: ${new Date(r.updated_at).toLocaleString('ko-KR')}</div>
         </div>
         ${badge}`;
      const resetBtn = document.createElement('button');
      resetBtn.className = 'run-btn btn-sm';
      resetBtn.style.marginLeft = '10px';
      resetBtn.textContent = '0000으로 초기화';
      resetBtn.onclick = (e) => { e.stopPropagation(); _resetRegionPw(r.province, r.city); };
      card.appendChild(resetBtn);

      resultEl.innerHTML = '';
      resultEl.appendChild(card);
    }

    async function _resetRegionPw(province, city) {
      if (!confirm(`${province} ${city}의 비밀번호를 "0000"으로 초기화하시겠습니까?`)) return;
      try {
        const res = await _adminFetch('/region-auth/admin/reset', {
          method: 'POST',
          body: JSON.stringify({ province, city }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '초기화 실패');
        // 목록 전체를 다시 불러오지 않고(드롭다운 옵션이 중복 추가됨), 캐시에 있는
        // 그 지역 항목만 갱신해서 결과 카드를 다시 그린다.
        const r = _rpRegions.find(x => x.province === province && x.city === city);
        if (r) { r.must_change_password = true; r.updated_at = new Date().toISOString(); }
        _onRpCityChange();
      } catch (e) {
        alert(e.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!_ensureAdminAuth()) return;
      _loadRpRegions();
    });
  </script>
</body>
</html>
