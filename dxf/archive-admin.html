<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도면 아카이브 관리자</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app admin-app">
    <header class="app-header">
      <a class="back-link" href="index.html">← 도면 분석기로</a>
      <div class="admin-title-row">
        <h1>도면 아카이브 관리자</h1>
        <button class="run-btn btn-sm btn-green" onclick="window.open('eia-upload.html','_blank')">
          환경영향평가 목록 엑셀 업로드
        </button>
      </div>
    </header>

    <div class="layout-row">
      <!-- 왼쪽 1/3: 기존 프로젝트 조회 -->
      <aside class="archive-col">
        <section class="section">
          <div class="section-title">기존 프로젝트에 단계 추가 / 정정</div>
          <p class="section-hint">일련번호, 사업명, 사업자명 등으로 검색하세요.</p>
          <div class="archive-search-row">
            <input type="text" id="lookup-serial" class="admin-input" placeholder="일련번호, 사업명, 사업자명 검색"
                   oninput="onLookupSearch(false)"
                   onkeydown="if(event.key==='Enter') onLookupSearch(true)">
            <button class="run-btn archive-search-btn" onclick="onLookupSearch(true)">조회</button>
          </div>
          <div class="lookup-scroll">
            <div id="lookup-results"></div>
            <div id="lookup-result"></div>
          </div>
        </section>
      </aside>

      <!-- 오른쪽 2/3: 신규 등록(상단) + 도면 미리보기(하단) -->
      <div class="main-col">
        <div class="admin-right-col">

          <div class="admin-register-section">
            <div class="section-title" style="margin-bottom:6px">신규 프로젝트 등록</div>
            <div class="admin-form-grid">
              <input type="text"   id="new-serial"   class="admin-input" placeholder="일련번호 (예: HG20261345)"
                     oninput="onNewSerialInput()">
              <input type="text"   id="new-name"     class="admin-input" placeholder="사업명">
              <input type="text"   id="new-agency"   class="admin-input" placeholder="기관명 (협의기관)">
              <input type="text"   id="new-operator" class="admin-input" placeholder="사업자명">
              <input type="text"   id="new-location" class="admin-input" placeholder="위치">
              <input type="number" id="new-year"     class="admin-input" placeholder="최초 환경영향평가 연도">
              <input type="text"   id="new-notes"    class="admin-input" placeholder="비고">
            </div>
            <div class="admin-slots-scroll">
              <div class="slots-wrap timeline-wrap" id="new-slots-wrap"></div>
            </div>
            <button class="run-btn" onclick="submitNewProject()">프로젝트 등록</button>
            <div id="new-project-status"></div>
          </div>

          <div class="admin-preview-section">
            <div class="section-title" style="margin-bottom:6px">도면 미리보기</div>
            <div class="preview-box">
              <canvas id="preview-canvas"></canvas>
              <div class="preview-empty" id="preview-empty">도면 타일을 클릭하면<br>여기에 미리보기가 표시됩니다</div>
            </div>
            <div class="preview-meta" id="preview-meta"></div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js"
          onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js';document.head.appendChild(s);"></script>
  <script src="js/parser.js"></script>
  <script src="js/geometry.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/archive-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/archive-admin.js"></script>
</body>
</html>
