<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도면 아카이브 관리자</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app admin-app">
    <header class="app-header">
      <div class="header-titlebar">
        <div class="admin-header-row">
          <a class="back-link-underline" href="index.html">← 돌아가기</a>
          <h1>🗂️ 도면 아카이브 관리자 ✏️</h1>
          <div class="admin-header-btns">
            <button class="run-btn btn-sm btn-green" onclick="window.open('eia-upload.html','_blank')">
              환경영향평가 목록 엑셀 업로드
            </button>
            <button class="run-btn btn-sm" onclick="window.open('region-password-admin.html','_blank')">
              지역 비밀번호 관리
            </button>
          </div>
        </div>
        <div id="region-session-info" class="region-session-info" style="display:none"></div>
      </div>
    </header>

    <!-- 세션 내 비밀번호 변경 모달 -->
    <div id="session-changepw-modal" class="region-fix-overlay" style="display:none">
      <div class="region-fix-box" style="max-width:360px;gap:8px">
        <div class="section-title" style="margin-bottom:4px">🔑 비밀번호 변경</div>
        <input type="password" id="session-cur-pw"  class="admin-input" placeholder="현재 비밀번호">
        <input type="password" id="session-new-pw-1" class="admin-input" placeholder="새 비밀번호">
        <input type="password" id="session-new-pw-2" class="admin-input" placeholder="새 비밀번호 확인"
               onkeydown="if(event.key==='Enter') _sessionChangePassword()">
        <div id="session-changepw-status"></div>
        <div class="region-fix-actions" style="margin-top:8px">
          <button class="run-btn" onclick="_sessionChangePassword()">변경</button>
          <button class="run-btn" style="background:var(--gray-100);color:var(--gray-700);border:1px solid var(--border)" onclick="_hideSessionChangePw()">취소</button>
        </div>
      </div>
    </div>

    <!-- 지역 로그인 화면 -->
    <div id="region-login-screen" class="region-login-screen">
      <div class="region-login-box">
        <div class="section-title">🔐 지역 로그인</div>
        <p class="section-hint">소속 광역·기초자치단체와 비밀번호를 입력하세요.</p>
        <select id="login-province" class="admin-input" onchange="_onLoginProvinceChange()">
          <option value="">광역자치단체 선택</option>
        </select>
        <select id="login-city" class="admin-input" disabled>
          <option value="">기초자치단체 선택</option>
        </select>
        <input type="password" id="login-password" class="admin-input" placeholder="비밀번호"
               onkeydown="if(event.key==='Enter') _regionLogin()">
        <button class="run-btn" onclick="_regionLogin()">로그인</button>
        <div id="region-login-status"></div>
      </div>
    </div>

    <!-- 최초 로그인 시 강제 비밀번호 변경 화면 -->
    <div id="region-changepw-screen" class="region-login-screen" style="display:none">
      <div class="region-login-box">
        <div class="section-title">🔑 비밀번호 변경 (최초 로그인)</div>
        <p class="section-hint">초기 비밀번호(0000)는 계속 쓸 수 없습니다. 새 비밀번호로 바꿔주세요.</p>
        <input type="password" id="new-pw-1" class="admin-input" placeholder="새 비밀번호">
        <input type="password" id="new-pw-2" class="admin-input" placeholder="새 비밀번호 확인"
               onkeydown="if(event.key==='Enter') _regionChangePassword()">
        <button class="run-btn" onclick="_regionChangePassword()">변경하고 계속</button>
        <div id="region-changepw-status"></div>
      </div>
    </div>

    <div id="admin-main-content" class="layout-row" style="display:none">
      <!-- 왼쪽 1/3: 기존 프로젝트 조회 -->
      <aside class="archive-col">
        <section class="section">
          <div class="section-title">환경영향평가 사업 검색</div>
          <div class="archive-search-row">
            <input type="text" id="lookup-serial" class="admin-input" placeholder="일련번호, 사업명, 사업자명 검색"
                   oninput="onLookupSearch(false)"
                   onkeydown="if(event.key==='Enter') onLookupSearch(true)">
            <button class="run-btn archive-search-btn" onclick="onLookupSearch(true)">조회</button>
          </div>
          <div id="lookup-load-status"></div>
          <div class="lookup-scroll">
            <div id="lookup-results"></div>
          </div>
        </section>
      </aside>

      <!-- 오른쪽 2/3: 신규 등록(상단) + 도면 미리보기(하단) -->
      <div class="main-col">
        <div class="admin-right-col">

          <div class="admin-register-section">
            <div class="section-title" id="register-section-title" style="margin-bottom:5px">📌 신규 프로젝트 등록</div>

            <!-- 첫 줄: 사업명 / 위치 -->
            <div class="admin-form-row-2">
              <div class="admin-field">
                <div class="admin-field-label">사업명</div>
                <input type="text" id="new-name" class="admin-input" placeholder="사업명">
              </div>
              <div class="admin-field">
                <div class="admin-field-label">소재지</div>
                <input type="text" id="new-location" class="admin-input" placeholder="위치">
              </div>
            </div>

            <!-- 둘째 줄: 일련번호 / 협의년도 / 사업면적 / 사업자명 / 협의기관(드롭다운) / 평가종류(드롭다운) -->
            <div class="admin-form-row-6">
              <div class="admin-field">
                <div class="admin-field-label">사업코드</div>
                <input type="text" id="new-serial" class="admin-input" placeholder="HG20261345"
                       oninput="onNewSerialInput()">
              </div>
              <div class="admin-field year-picker-wrap">
                <div class="admin-field-label">협의년도</div>
                <input type="text" id="new-year" class="admin-input year-picker-input" placeholder="년도" readonly>
                <div id="year-picker-panel" class="year-picker-panel"></div>
              </div>
              <div class="admin-field">
                <div class="admin-field-label">규모(㎡)</div>
                <input type="text" id="new-site-area" class="admin-input" placeholder="–" readonly>
              </div>
              <div class="admin-field">
                <div class="admin-field-label">사업자명</div>
                <input type="text" id="new-operator" class="admin-input" placeholder="사업자명">
              </div>
              <div class="admin-field">
                <div class="admin-field-label">협의기관</div>
                <select id="new-agency" class="admin-input">
                  <option value="">선택</option>
                  <option>기후에너지환경부</option>
                  <option>한강유역환경청</option>
                  <option>낙동강유역환경청</option>
                  <option>금강유역환경청</option>
                  <option>영산강유역환경청</option>
                  <option>원주지방환경청</option>
                  <option>대구지방환경청</option>
                  <option>대전지방환경청</option>
                  <option>강원특별자치도청</option>
                  <option>전북특별자치도청</option>
                  <option>제주특별자치도청</option>
                  <option>전남광주통합특별자치청</option>
                  <option>수도권대기환경청</option>
                  <option>새만금개발청</option>
                </select>
              </div>
              <div class="admin-field">
                <div class="admin-field-label">평가종류</div>
                <select id="new-assessment-type" class="admin-input">
                  <option value="">선택</option>
                  <option>전략환경영향평가</option>
                  <option>환경영향평가</option>
                  <option>소규모환경영향평가</option>
                  <option>사전환경성검토</option>
                </select>
              </div>
            </div>

            <div class="admin-slots-scroll">
              <div class="slots-wrap timeline-wrap" id="new-slots-wrap"></div>
            </div>

            <!-- 범례(1) : 도면 미리보기(3) 좌우분할 — 범례는 입력칸이라 폭이 짧아도 되고, 미리보기는 넓게 -->
            <div class="admin-legend-preview-row">
              <div class="admin-legend-col">
                <div class="legend-wrap" id="admin-legend-wrap"></div>
              </div>
              <div class="admin-preview-col">
                <div class="preview-box">
                  <canvas id="preview-canvas"></canvas>
                  <div class="preview-empty" id="preview-empty">도면 타일을 클릭하면<br>여기에 미리보기가 표시됩니다</div>
                </div>
                <div class="preview-meta" id="preview-meta"></div>
              </div>
            </div>

            <div id="new-project-status"></div>
            <button class="run-btn" id="project-submit-btn" onclick="submitProjectForm()">프로젝트 등록</button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js"
          onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js';document.head.appendChild(s);"></script>
  <script src="js/parser.js"></script>
  <script src="js/geometry.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/archive-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/region-standard.js"></script>
  <script src="js/region-auth.js"></script>
  <script src="js/archive-admin.js"></script>
</body>
</html>
