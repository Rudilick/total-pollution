<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도면 아카이브 관리자</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="back-link" href="index.html">← 도면 분석기로</a>
      <h1>도면 아카이브 관리자</h1>
      <p class="app-desc">일련번호별 표준화 단계별 DXF 도면을 등록·추가·정정합니다. 관리자 토큰이 필요합니다.</p>
    </header>

    <section class="section">
      <div class="section-title">관리자 토큰</div>
      <div class="archive-search-row">
        <input type="text" id="admin-token" class="admin-input" placeholder="관리자 토큰 입력">
        <button class="run-btn archive-search-btn" onclick="saveAdminToken()">저장</button>
      </div>
      <div id="token-status" class="archive-empty"></div>
    </section>

    <section class="section">
      <div class="section-title">신규 프로젝트 등록</div>
      <p class="section-hint">최초 도면부터 순서대로 단계별 DXF를 업로드하세요. (1번째 슬롯 = 최초도면)</p>
      <div class="admin-form-grid">
        <input type="text"   id="new-serial"   class="admin-input" placeholder="일련번호 (예: HG20261345)">
        <input type="text"   id="new-name"     class="admin-input" placeholder="사업명">
        <input type="text"   id="new-operator" class="admin-input" placeholder="사업자명">
        <input type="text"   id="new-location" class="admin-input" placeholder="위치">
        <input type="number" id="new-year"     class="admin-input" placeholder="최초 환경영향평가 연도">
        <input type="text"   id="new-notes"    class="admin-input" placeholder="비고">
      </div>
      <div class="slots-wrap" id="new-slots-wrap"></div>
      <button class="run-btn" onclick="submitNewProject()">프로젝트 등록</button>
      <div id="new-project-status"></div>
    </section>

    <section class="section">
      <div class="section-title">기존 프로젝트에 단계 추가 / 정정</div>
      <div class="archive-search-row">
        <input type="text" id="lookup-serial" class="admin-input" placeholder="일련번호 입력"
               onkeydown="if(event.key==='Enter') lookupProject()">
        <button class="run-btn archive-search-btn" onclick="lookupProject()">조회</button>
      </div>
      <div id="lookup-result"></div>
    </section>
  </div>

  <script src="js/parser.js"></script>
  <script src="js/geometry.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/archive-config.js"></script>
  <script src="js/archive-admin.js"></script>
</body>
</html>
