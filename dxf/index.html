<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환경영향평가 변경협의 대상여부 검토</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-titlebar">
        <div class="admin-header-row">
          <a class="back-link" href="../index.html">← 홈으로</a>
          <h1>📑 환경영향평가 변경협의 대상여부 검토 🔍</h1>
          <a class="back-link" href="archive-admin.html">도면 아카이브 관리자 →</a>
        </div>
      </div>
    </header>

    <div class="layout-row">
      <aside class="archive-col">
        <section class="section">
          <div class="section-title">환경영향평가 사업 검색</div>
          <div id="archive-body">
            <div class="archive-search-row">
              <input type="text" id="archive-query" placeholder="일련번호 또는 사업명 검색"
                     oninput="onArchiveSearch()"
                     onkeydown="if(event.key==='Enter') onArchiveSearch()">
              <button class="run-btn archive-search-btn" onclick="onArchiveSearch()">검색</button>
            </div>
            <div id="archive-load-status"></div>
            <div id="archive-results" class="archive-results-scroll"></div>
          </div>
        </section>
      </aside>

      <div class="main-col">
        <section class="section">
          <div class="section-title">도면 작성방법</div>
          <div class="authoring-steps">
            <div class="authoring-step"><span class="authoring-step-num">1</span>단일레이어로 작성</div>
            <span class="authoring-step-arrow">→</span>
            <div class="authoring-step" title="환경영향평가서 상 토지이용계획과 동일한 색상으로 구분하여 해치(솔리드)로 표현"><span class="authoring-step-num">2</span>동일 색상 해치(솔리드)로 표현</div>
            <span class="authoring-step-arrow">→</span>
            <div class="authoring-step" title="해치가 서로 겹치면 분석이 차단됩니다"><span class="authoring-step-num">3</span>해치 겹침 없이 작성</div>
            <span class="authoring-step-arrow">→</span>
            <div class="authoring-step"><span class="authoring-step-num">4</span>dxf파일로 저장</div>
          </div>
          <div class="slots-wrap" id="slots-wrap"></div>
          <div class="border-info" id="border-info"></div>
          <div class="legend-wrap" id="legend-wrap"></div>
        </section>

        <button class="run-btn" id="run-btn" onclick="runAll()" disabled>분석 실행</button>
        <div id="errdiv" style="display:none"></div>

        <div class="results" id="results" style="display:none">
          <div class="divider"></div>
          <div class="section-title">단계별 토지이용 변경률</div>
          <div id="pairs-wrap"></div>
          <div class="total-box">
            <div class="total-grid" id="total-grid"></div>
          </div>
          <div style="margin-top:20px;text-align:center;">
            <button class="export-btn" id="export-btn" onclick="exportReport(lastResult, slots)">
              📄 비교 도면 + 일람표 내보내기 (PDF)
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js"
          onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js';document.head.appendChild(s);"></script>
  <script src="js/parser.js"></script>
  <script src="js/geometry.js"></script>
  <script src="js/analyzer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/archive-config.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
