<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXF 토지이용계획 변경 분석기</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="back-link" href="../index.html">← 홈으로</a>
      <h1>토지이용계획 변경 분석기</h1>
      <p class="app-desc">DXF 도면을 단계별로 업로드하여 토지이용계획 변경률과 사업부지 증가율을 산출합니다.</p>
    </header>

    <section class="section">
      <div class="section-title">도면 단계별 업로드</div>
      <p class="section-hint">최초 도면부터 순서대로 업로드하세요. 외곽 레이어(둘레 / BORDER / FRAME)가 포함된 DXF 파일을 사용하면 자동으로 좌표 정합이 적용됩니다.</p>
      <div class="slots-wrap" id="slots-wrap"></div>
      <div class="border-info" id="border-info"></div>
    </section>

    <button class="run-btn" id="run-btn" onclick="runAll()" disabled>분석 실행</button>
    <div id="errdiv" style="display:none"></div>

    <div class="results" id="results" style="display:none">
      <div class="divider"></div>
      <div class="section-title">단계별 토지이용 변경률</div>
      <div id="pairs-wrap"></div>
      <div class="total-box">
        <div class="total-grid" id="total-grid"></div>
      </div>
      <div style="margin-top:20px;text-align:center;">
        <button class="export-btn" id="export-btn" onclick="exportReport(lastResult, slots)">
          📄 비교 도면 + 일람표 내보내기 (PDF)
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/geometry.js"></script>
  <script src="js/analyzer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
