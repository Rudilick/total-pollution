<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환경영향평가 목록 업로드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="back-link" href="archive-admin.html">← 도면 아카이브 관리자로</a>
      <h1>환경영향평가 목록 업로드</h1>
      <p class="app-desc">엑셀을 업로드하면 새 자료만 추가됩니다 — 이미 있는 자료(일련번호+협의기관+평가종류 모두 일치)는 건드리지 않고 그대로 둡니다.</p>
    </header>

    <section class="section">
      <div class="eia-upload-grid">
        <div class="eia-upload-block" data-type="전략환경영향평가">
          <div class="eia-upload-title">전략환경영향평가</div>
          <a href="assets/eia_list_template.xlsx" download class="eia-template-link">양식 다운로드</a>
          <input type="file" accept=".xlsx" class="eia-file-input">
          <button class="run-btn eia-upload-btn">업로드 (새 자료만 추가)</button>
          <div class="eia-upload-status"></div>
        </div>

        <div class="eia-upload-block" data-type="환경영향평가">
          <div class="eia-upload-title">환경영향평가</div>
          <a href="assets/eia_list_template.xlsx" download class="eia-template-link">양식 다운로드</a>
          <input type="file" accept=".xlsx" class="eia-file-input">
          <button class="run-btn eia-upload-btn">업로드 (새 자료만 추가)</button>
          <div class="eia-upload-status"></div>
        </div>

        <div class="eia-upload-block" data-type="소규모환경영향평가">
          <div class="eia-upload-title">소규모환경영향평가</div>
          <a href="assets/eia_list_template.xlsx" download class="eia-template-link">양식 다운로드</a>
          <input type="file" accept=".xlsx" class="eia-file-input">
          <button class="run-btn eia-upload-btn">업로드 (새 자료만 추가)</button>
          <div class="eia-upload-status"></div>
        </div>

        <div class="eia-upload-block" data-type="사전환경성검토">
          <div class="eia-upload-title">사전환경성검토</div>
          <a href="assets/eia_list_template.xlsx" download class="eia-template-link">양식 다운로드</a>
          <input type="file" accept=".xlsx" class="eia-file-input">
          <button class="run-btn eia-upload-btn">업로드 (새 자료만 추가)</button>
          <div class="eia-upload-status"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
          onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';document.head.appendChild(s);"></script>
  <script src="js/archive-config.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/eia-admin.js"></script>
</body>
</html>
